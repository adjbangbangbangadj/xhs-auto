name: Smoke Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xhs-cs-ai-agent-workspace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: xhs-cs-ai-agent-workspace/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare dry-run config
        run: cp config.example.yaml config.yaml

      - name: Run single-content dry-run
        run: python -m pipeline run --idea-id 001 --dry-run

      - name: Run weekly-review dry-run
        run: python -m pipeline weekly-review --dry-run

      - name: Run smoke test script
        run: python scripts/run_smoke_tests.py

